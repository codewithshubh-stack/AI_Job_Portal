services:
  # Backend API Django Web Service
  - type: web
    name: talentai-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input"
    startCommand: "cd backend && gunicorn core.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: talentai-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: OPENAI_API_KEY
        sync: false

  # Frontend React (Vite) Static Site
  - type: web
    name: talentai-frontend
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: talentai-backend
          property: url
        value: "${value}/api/v1"

databases:
  - name: talentai-db
    plan: free
